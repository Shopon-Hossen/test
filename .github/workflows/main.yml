name: Build KivyMD 2.0 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # This allows you to run it manually from the "Actions" tab

jobs:
  build:
    runs-on: ubuntu-22.04 # Pinning to 22.04 is safer for Buildozer right now

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Best stability for current Kivy/Cython builds

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Buildozer & Cython
        run: |
          pip install --upgrade pip
          pip install "cython<3.0" buildozer virtualenv # Pinning Cython prevents the error you saw in Colab

      - name: Build with Buildozer
        run: |
          # We use "yes |" to auto-accept Android SDK licenses
          yes | buildozer android debug
        env:
          # This helps Buildozer find the right tools on GitHub's runner
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-kivymd-app
          path: bin/*.apk
          retention-days: 3 # Keeps the file for 3 days to save space
